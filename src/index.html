<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>relay</title>
<link rel="stylesheet" href="/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Relay">
<link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>

<div id="topbar">
  <div class="logo">RELAY</div>
  <div id="poll-status">--:--:--</div>
</div>

<div id="app">

  <div id="sidebar">
    <div id="sidebar-header">
      <button id="collapse-btn" onclick="toggleSidebar()" title="toggle sidebar">&#x2630;</button>
      <span>chats</span>
      <button class="new-btn" onclick="toggleNewChatForm()" title="new chat">+</button>
    </div>
    <div id="new-chat-form" style="display:none;padding:8px 10px;border-bottom:1px solid var(--border);gap:6px;flex-direction:column;background:var(--bg3);">
      <input type="text" id="new-chat-name" placeholder="chat name..." onkeydown="if(event.key==='Enter')newChat();if(event.key==='Escape')toggleNewChatForm(false);" style="width:100%;">
      <label style="display:flex;align-items:center;gap:6px;color:var(--text);font-size:11px;cursor:pointer;">
        <input type="checkbox" id="new-chat-group" onchange="toggleGroupFields()"> group chat
      </label>
      <input type="text" id="new-chat-myname" placeholder="your name in this group..." style="display:none;width:100%;">
      <div style="display:flex;gap:6px;">
        <button class="primary" onclick="newChat()" style="flex:1;">create</button>
        <button onclick="toggleNewChatForm(false)">cancel</button>
      </div>
    </div>
    <div id="chat-list"></div>
  </div>

  <div id="main">
    <div id="empty-state">no chat selected</div>
    <div id="chat-view">
      <div id="chat-header"></div>
      <div id="messages"></div>
      <div id="compose-area"></div>
    </div>
  </div>

</div>

<div id="notif"></div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
